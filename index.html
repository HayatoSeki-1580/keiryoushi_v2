<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>計量士国家試験 過去問アプリ</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>

<!-- ===== ナビゲーション ===== -->
<nav id="main-nav">
  <button id="btn-home" class="nav-btn active">🏠 ホーム</button>
  <button id="btn-quiz" class="nav-btn">📝 問題</button>
  <button id="btn-results" class="nav-btn">📊 結果</button>
</nav>

<!-- ===== トースト通知 ===== -->
<div id="toast" class="toast hidden"></div>

<!-- ===== ホームパネル ===== -->
<div id="panel-home" class="panel active">
  <h1>計量士国家試験 過去問</h1>

  <section class="card">
    <h2>科目を選ぶ</h2>
    <div id="subject-buttons"></div>
  </section>

  <section class="card" id="difficulty-section" style="display:none">
    <h2>難易度フィルター（ホーム）</h2>
    <div class="difficulty-filter" data-panel="home">
      <label><input type="checkbox" class="diff-check" value="1" checked> ★☆☆</label>
      <label><input type="checkbox" class="diff-check" value="2" checked> ★★☆</label>
      <label><input type="checkbox" class="diff-check" value="3" checked> ★★★</label>
    </div>
  </section>

  <section class="card" id="mode-section" style="display:none">
    <h2>モードを選ぶ</h2>
    <div id="mode-buttons">
      <button id="btn-sequential">順番に解く</button>
      <button id="btn-shuffle">
        シャッフル
        <select id="shuffle-count" onclick="event.stopPropagation()">
          <option value="5">5問</option>
          <option value="10" selected>10問</option>
          <option value="15">15問</option>
          <option value="20">20問</option>
          <option value="30">30問</option>
        </select>
      </button>
      <button id="btn-weak">苦手問題</button>
    </div>
  </section>
</div>

<!-- ===== 問題パネル ===== -->
<div id="panel-quiz" class="panel">
  <div id="quiz-header">
    <span id="quiz-progress"></span>
    <span id="quiz-timer"></span>
  </div>

  <div class="card">
    <div id="difficulty-display"></div>
    <div id="question-text"></div>
    <canvas id="pdf-canvas"></canvas>
    <div id="choices"></div>
  </div>

  <section class="card">
    <h2>難易度フィルター（問題中）</h2>
    <div class="difficulty-filter" data-panel="quiz">
      <label><input type="checkbox" class="diff-check" value="1" checked> ★☆☆</label>
      <label><input type="checkbox" class="diff-check" value="2" checked> ★★☆</label>
      <label><input type="checkbox" class="diff-check" value="3" checked> ★★★</label>
    </div>
  </section>

  <div id="quiz-nav">
    <button id="btn-prev">◀ 前へ</button>
    <button id="btn-next">次へ ▶</button>
  </div>
</div>

<!-- ===== 結果パネル ===== -->
<div id="panel-results" class="panel">
  <div class="card">
    <h2>結果</h2>
    <div id="score-display"></div>
    <div id="certificate"></div>
  </div>

  <div class="card">
    <h2>学習履歴</h2>
    <div id="history-display"></div>
    <button id="btn-clear-history" class="danger-btn">🗑 履歴をクリア</button>
  </div>

  <button id="btn-back-home">🏠 ホームへ戻る</button>
</div>

<!-- ===== 解説モーダル ===== -->
<div id="modal-overlay" class="hidden">
  <div id="modal-content">
    <button id="modal-close">✕</button>
    <div id="explanation-text"></div>
    <div id="explanation-difficulty">
      難易度：
      <button class="diff-btn" data-value="1">★☆☆</button>
      <button class="diff-btn" data-value="2">★★☆</button>
      <button class="diff-btn" data-value="3">★★★</button>
    </div>
  </div>
</div>

<!-- ===== スピナー ===== -->
<div id="spinner" class="hidden">
  <div class="spinner-inner"></div>
</div>

<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/timer.js"></script>
<script src="js/pdf.js"></script>
<script src="js/quiz.js"></script>
<script src="js/explanation.js"></script>
<script src="js/results.js"></script>
<script src="js/app.js"></script>
</body>
</html>
