<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>計量士国家試験 演習ブラウザ</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

    <style>
        /* 解説ボタン（初期は非表示） */
        .explanation-btn {
            background-color: #28a745; /* 緑色 */
            color: white;
            margin-left: 10px;
        }
        .explanation-btn:hover { background-color: #218838; }

        /* モーダル全体のスタイル */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            overflow: auto; 
            background-color: rgba(0,0,0,0.5); /* 背景を暗く */
        }

        /* モーダルコンテンツ */
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto; 
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 800px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
        }

        /* 閉じるボタン */
        .close-modal {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close-modal:hover,
        .close-modal:focus {
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        /* 解説本文のスタイル */
        #explanation-body {
            line-height: 1.6;
            margin-top: 10px;
            font-size: 16px;
        }
        #explanation-body h3 { border-bottom: 2px solid #ddd; padding-bottom: 5px; }
        #explanation-body code { background-color: #f4f4f4; padding: 2px 5px; border-radius: 3px; }
        #explanation-body blockquote { border-left: 4px solid #ccc; margin: 0; padding-left: 10px; color: #555; }
    </style>
</head>
<body>
    <h1>計量士国家試験 演習ブラウザ</h1>

    <div id="exercise-view">

        <div class="mode-tabs">
            <button id="tab-by-edition" class="tab-btn active">年度別演習</button>
            <button id="tab-by-field" class="tab-btn">分野別演習</button>
            <button id="tab-shuffle" class="tab-btn">シャッフル演習</button>
        </div>

        <div id="panel-by-edition" class="control-panel">
            <div class="top-row">
                <div class="select-group">
                    <label for="edition-select">実施回:</label>
                    <select id="edition-select"></select>
                </div>
                <div class="select-group">
                    <label for="subject-select-edition">科目:</label>
                    <select id="subject-select-edition">
                        <option value="kanka">環化</option>
                        <option value="kanbutsu">環物</option>
                        <option value="kannou">環濃</option>
                        <option value="kanon">環音</option>
                        <option value="houki">法規</option>
                        <option value="kanri">管理</option>
                        <option value="ichiki">一基</option>
                        <option value="keishitsu">計質</option>
                    </select>
                </div>
                
                <div class="filter-group">
                    <span class="filter-label">難易度:</span>
                    <label><input type="checkbox" value="A" checked class="diff-filter-cb">A(易)</label>
                    <label><input type="checkbox" value="B" checked class="diff-filter-cb">B(普)</label>
                    <label><input type="checkbox" value="C" checked class="diff-filter-cb">C(難)</label>
                    <label><input type="checkbox" value="none" checked class="diff-filter-cb">指定なし</label>
                </div>

                <button id="go-btn-edition">表示</button>

                <div class="toggle-group">
                    <label for="toggle-diff-edition">難易度を表示</label>
                    <input type="checkbox" id="toggle-diff-edition" class="difficulty-toggle-checkbox">
                </div>
            </div>
            <div class="actions-row">
                <div class="answer-group">
                    <span class="answer-label">解答:</span>
                    <div class="answer-buttons">
                        <button class="answer-btn" data-choice="1">1</button>
                        <button class="answer-btn" data-choice="2">2</button>
                        <button class="answer-btn" data-choice="3">3</button>
                        <button class="answer-btn" data-choice="4">4</button>
                        <button class="answer-btn" data-choice="5">5</button>
                    </div>
                </div>
                <div id="score-counter-edition" class="score-counter">
                    正答数: <span class="score-correct">0</span>
                </div>
                <button id="show-results-btn-edition" class="results-btn">成績を見る</button>
                <button id="btn-explanation-edition" class="explanation-btn hidden">解説を見る</button>
                <div id="result-area-edition" class="result-area"></div>
            </div>
        </div>

        <div id="panel-by-field" class="control-panel hidden">
             <div class="top-row">
                 <div class="select-group">
                     <label for="subject-select-field">科目:</label>
                     <select id="subject-select-field">
                         <option value="kanka">環化</option>
                         <option value="kanbutsu">環物</option>
                         <option value="kannou">環濃</option>
                         <option value="kanon">環音</option>
                         <option value="houki">法規</option>
                         <option value="kanri">管理</option>
                         <option value="ichiki">一基</option>
                         <option value="keishitsu">計質</option>
                     </select>
                 </div>
                 <div class="select-group">
                     <label>分野:</label> 
                     <div id="field-select-custom" class="custom-select">
                         <div class="select-selected">分野を選択...</div>
                         <div class="select-items select-hide"></div>
                     </div>
                 </div>

                 <div class="filter-group">
                    <span class="filter-label">難易度:</span>
                    <label><input type="checkbox" value="A" checked class="diff-filter-cb">A(易)</label>
                    <label><input type="checkbox" value="B" checked class="diff-filter-cb">B(普)</label>
                    <label><input type="checkbox" value="C" checked class="diff-filter-cb">C(難)</label>
                    <label><input type="checkbox" value="none" checked class="diff-filter-cb">指定なし</label>
                </div>

                 <button id="go-btn-field">表示</button>

                 <div class="toggle-group">
                    <label for="toggle-diff-field">難易度を表示</label>
                    <input type="checkbox" id="toggle-diff-field" class="difficulty-toggle-checkbox">
                </div>
             </div>
            <div class="actions-row">
                 <div class="answer-group">
                    <span class="answer-label">解答:</span>
                    <div class="answer-buttons">
                        <button class="answer-btn" data-choice="1">1</button>
                        <button class="answer-btn" data-choice="2">2</button>
                        <button class="answer-btn" data-choice="3">3</button>
                        <button class="answer-btn" data-choice="4">4</button>
                        <button class="answer-btn" data-choice="5">5</button>
                    </div>
                </div>
                <div id="score-counter-field" class="score-counter">
                    正答数: <span class="score-correct">0</span>
                </div>
                <button id="show-results-btn-field" class="results-btn">成績を見る</button>
                <button id="btn-explanation-field" class="explanation-btn hidden">解説を見る</button>
                <div id="result-area-field" class="result-area"></div>
            </div>
        </div>

        <div id="panel-shuffle" class="control-panel hidden">
            <div class="top-row">
                <div class="subject-checkbox-container">
                    <span class="filter-label">出題科目:</span>
                    <div class="checkbox-grid">
                        <label><input type="checkbox" value="kanka" class="shuffle-subject-cb">環化</label>
                        <label><input type="checkbox" value="kanbutsu" class="shuffle-subject-cb">環物</label>
                        <label><input type="checkbox" value="kannou" class="shuffle-subject-cb">環濃</label>
                        <label><input type="checkbox" value="kanon" class="shuffle-subject-cb">環音</label>
                        <label><input type="checkbox" value="houki" class="shuffle-subject-cb">法規</label>
                        <label><input type="checkbox" value="kanri" class="shuffle-subject-cb">管理</label>
                        <label><input type="checkbox" value="ichiki" class="shuffle-subject-cb">一基</label>
                        <label><input type="checkbox" value="keishitsu" class="shuffle-subject-cb">計質</label>
                    </div>
                </div>

                 <div class="filter-group">
                    <span class="filter-label">難易度:</span>
                    <label><input type="checkbox" value="A" class="shuffle-diff-cb">A(易)</label>
                    <label><input type="checkbox" value="B" class="shuffle-diff-cb">B(普)</label>
                    <label><input type="checkbox" value="C" class="shuffle-diff-cb">C(難)</label>
                    <label><input type="checkbox" value="none" checked class="shuffle-diff-cb">指定なし</label>
                </div>

                <button id="go-btn-shuffle" class="exam-start-btn">演習開始 (5問)</button>
            </div>
            
            <div class="actions-row">
                <div class="answer-group">
                   <span class="answer-label">解答:</span>
                   <div class="answer-buttons">
                       <button class="answer-btn" data-choice="1">1</button>
                       <button class="answer-btn" data-choice="2">2</button>
                       <button class="answer-btn" data-choice="3">3</button>
                       <button class="answer-btn" data-choice="4">4</button>
                       <button class="answer-btn" data-choice="5">5</button>
                   </div>
               </div>
               
               <div id="score-counter-shuffle" class="score-counter hidden">
                   正答数: <span class="score-correct">0</span>
               </div>
               
               <button id="finish-exam-btn" class="results-btn hidden">試験終了</button>
               <button id="show-results-btn-shuffle" class="results-btn hidden">成績を見る</button>
               <button id="btn-explanation-shuffle" class="explanation-btn hidden">解説を見る</button>
               
               <div id="result-area-shuffle" class="result-area"></div>
           </div>
       </div>

        <div class="navigation">
            <button id="prev-btn">◀ 前の問題</button>
            <span id="page-indicator">問 <span id="page-num">?</span> / <span id="page-count">?</span></span>
            <span id="difficulty-badge" class="difficulty-badge hidden"></span>
            
            <span id="exam-timer" class="exam-timer hidden">00:00</span>

            <button id="next-btn">次の問題 ▶</button>
            <select id="jump-to-select" class="jump-select">
                <option value="">移動...</option>
            </select>
            <span id="question-source" class="source-info"></span>
        </div>

        <div class="viewer-container">
            <div id="welcome-overlay">
                <h2>過去問演習へようこそ！</h2>
                <p>学習したいモードを選択して「表示」ボタンを押してください。</p>
            </div>
            <div id="loading-spinner" class="spinner-overlay hidden">
                <div class="spinner"></div>
                <p>読み込み中...</p>
            </div>
            <canvas id="pdf-canvas"></canvas>
        </div>

    </div> 

    <div id="results-panel" class="hidden">
        <h2>成績一覧</h2>
        
        <div id="certificate-container" class="certificate hidden">
            <div class="cert-header">成績証明書</div>
            <div class="cert-body">
                <p>あなたは計量士国家試験 演習ブラウザの模擬試験において<br>以下の成績を収めました。</p>
                
                <div class="cert-meta">
                    <div class="cert-meta-row"><span class="cert-label">実施日:</span> <span id="cert-date"></span></div>
                    <div class="cert-meta-row"><span class="cert-label">科目:</span> <span id="cert-subjects"></span></div>
                    <div class="cert-meta-row"><span class="cert-label">難易度:</span> <span id="cert-difficulties"></span></div>
                </div>

                <div class="cert-score-area">
                    <div class="cert-score-label">スコア</div>
                    <div class="cert-score-value">
                        <span id="cert-score-num">0</span> / 5 点
                    </div>
                </div>
                <div class="cert-time-area">
                    解答時間: <span id="cert-time-value">--:--</span>
                </div>
                
                <div class="cert-details">
                    <table id="cert-details-table">
                        <thead>
                            <tr>
                                <th>No.</th>
                                <th>科目</th>
                                <th>年度</th>
                                <th>問</th>
                                <th>結果</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
            <div class="cert-footer">計量士委員会</div>
        </div>

        <div id="cert-image-container" class="hidden" style="text-align:center; margin-bottom:30px;"></div>

        <div id="results-summary"></div>
        <div id="results-list"></div>
        <button id="back-to-exercise-btn">演習に戻る</button>
    </div>

    <div id="explanation-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="explanation-title">解説</h2>
            <div id="explanation-body">
                </div>
        </div>
    </div>

    <script src="main.js" type="module"></script>
</body>
</html>
